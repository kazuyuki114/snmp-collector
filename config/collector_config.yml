# Sample collector configuration for local testing.
# Points config_paths at the sibling config directories so the binary
# can be run from the repo root without any environment variables:
#
#   snmpcollector -config config/collector_config.yml

log:
  level: info
  format: text

collector_id: "dev-collector-01"

pipeline:
  buffer_size: 1000
  decode_workers: 50
  produce_workers: 50

poller:
  workers: 300
  pool:
    max_idle: 3
    idle_timeout: 120s

processors:
  enum:
    enable: true
  counter:
    delta_enable: false
    purge_interval: 5m

format:
  otel: true
  otel_scope_name: "snmp-collector"
  otel_scope_version: "1.0.0"

config_reload_interval: 100s

config_paths:
  devices:       config/devices
  device_groups: config/device_groups
  object_groups: config/object_groups
  objects:       config/objects
  enums:         config/enums

health:
  addr: ":9080"

# ── High Availability ───────────────────────────────────────────────────────
#
# Two-node Active/Standby setup:
#   Primary (DC)  — role: primary  — starts Active, reclaims on restart
#   Standby (DR)  — role: standby  — monitors /health, fails over on N failures
#
# To test locally, run two instances on different ports:
#
#   Terminal 1 (Primary on :9080, /demote on :9080):
#     snmpcollector -config config/collector_config.yml \
#                   -health.addr :9080
#
#   Terminal 2 (Standby on :9081, /demote on :9081):
#     snmpcollector -config config/collector_config.yml \
#                   -collector.id dev-collector-02 \
#                   -health.addr :9081 \
#                   -ha.role standby \
#                   -ha.peer.url http://localhost:9080
#
# Failover test:  kill Terminal 1 → after 3×5s=15s Terminal 2 goes Active.
# Failback test:  restart Terminal 1 → it sends POST localhost:9081/demote →
#                 Terminal 2 stops → Terminal 1 becomes Active.
ha:
  enabled: false
  role: primary                      # primary | standby
  peer_url: "http://localhost:9081"  # base URL of the OTHER node's health server

  # Standby polls this often; lower = faster detection, higher = less traffic.
  health_check_interval: 5s

  # Per-request HTTP timeout for each GET /health call.
  health_check_timeout: 5s

  # Consecutive failures required before Standby promotes itself to Active.
  # At the defaults above: 3 × 5s = 15 s worst-case failover time.
  failover_threshold: 3

  # Timeout for the Primary's POST /demote call to the Standby on startup.
  # Must be long enough for the Standby's pipeline to fully drain (app.Stop).
  # Increase if your poller.workers count is high and in-flight polls take longer.
  demote_timeout: 30s

output:
  # Set enabled: true on exactly one block. The others must have enabled: false.
  # Default (all false or stdout enabled): write to stdout.

  # ── Send retry ─────────────────────────────────────────────────────────────
  send_max_retry: 3       # 0 = no retries (fail immediately on first error)
  send_retry_delay: 1s    # pause between retries (e.g. 500ms, 2s)

  # ── Stdout output ──────────────────────────────────────────────────────────
  stdout:
    enabled: false

  # ── File output ────────────────────────────────────────────────────────────
  file:
    enabled: false
    path: "snmp-metrics.json"              # e.g. /tmp/snmp-metrics.json
    max_bytes: 10485760   # 10 MB
    max_backups: 3

  # ── Kafka output ───────────────────────────────────────────────────────────
  kafka:
    enabled: true
    brokers: ["localhost:29092"]
    topic: snmp
    max_events: 100
    flush_interval: 5s
    buffer_size: 1000
    client_id: snmp-collector-dev
    required_acks: local  # none | local | all
    max_retry: 3
    compression: none     # none | gzip | snappy | lz4 | zstd
    version: ""

    tls:
      enable: false
      insecure_skip_verify: false
      ca_cert: ""
      client_cert: ""
      client_key: ""

    sasl:
      enable: false
      user: ""
      password: ""
      mechanism: PLAIN    # PLAIN | SCRAM-SHA-256 | SCRAM-SHA-512
