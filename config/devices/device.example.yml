# Example device definitions for SNMP Collector.
#
# Each top-level key is a device identifier (usually hostname/FQDN).
# You can keep one or many devices in this file.

router-v2c.example.com:
  ip: 192.0.2.10
  port: 161
  poll_interval: 60
  timeout: 3000
  retries: 2
  exponential_timeout: false
  version: 2c
  communities:
    - public
    - private
  device_groups:
    - generic
  max_concurrent_polls: 4
  use_getbulk: true

switch-v3.example.com:
  ip: 192.0.2.20
  port: 161
  poll_interval: 60
  timeout: 3000
  retries: 2
  exponential_timeout: false
  version: 3
  v3_credentials:
    # AuthPriv example (auth + privacy)
    - username: snmpv3user
      authentication_protocol: sha256
      authentication_passphrase: your_auth_passphrase
      privacy_protocol: aes256
      privacy_passphrase: your_priv_passphrase
    # Optional fallback credential (NoAuthNoPriv)
    - username: snmpv3readonly
      authentication_protocol: noauth
      authentication_passphrase: ""
      privacy_protocol: nopriv
      privacy_passphrase: ""
  device_groups:
    - generic
  max_concurrent_polls: 4
  use_getbulk: true